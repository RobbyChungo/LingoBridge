
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LingoBridge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<main class="app-container">

<!-- LANGUAGE CONTROLS -->

<header class="language-bar">

<select id="sourceLang">
<option value="en" selected>English</option>
<option value="fr">French</option>
</select>

<button id="swapBtn">⇄</button>

<select id="targetLang">
<option value="fr" selected>French</option>
<option value="en">English</option>
</select>

<button id="darkModeBtn">🌙</button>

</header>


<!-- TRANSLATION SECTION -->

<section class="cards">

<!-- INPUT CARD -->

<article class="card">

<h3>Input</h3>

<textarea id="inputText" maxlength="500">Hello, how are you?</textarea>

<footer class="card-footer">

<div>
<button id="listenInput">🔊 Listen</button>
<button id="copyInput">📋 Copy</button>
</div>

<span id="charCount">18/500</span>

</footer>

</article>


<!-- OUTPUT CARD -->

<article class="card">

<h3>Output</h3>

<textarea id="outputText" readonly></textarea>

<footer class="card-footer">

<div>
<button id="listenOutput">🔊 Listen</button>
<button id="copyOutput">📋 Copy</button>
</div>

</footer>

</article>

</section>


<!-- TRANSLATE BUTTON SECTION -->

<section class="center">

<button id="translateBtn">Translate</button>

<p id="loading">Translating...</p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
